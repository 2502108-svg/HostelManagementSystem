<div class="form-container">
  <div class="form-header">
    <h3>{{ isEditMode ? 'Modify Resident Details' : 'Register New Resident' }}</h3>
    <p>{{ isEditMode ? 'Update information for the selected student' : 'Enter student details to assign a room' }}</p>
  </div>

  <form [formGroup]="studentForm" (ngSubmit)="onSubmit()" class="student-form">
    <div class="form-group">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" formControlName="fullName" placeholder="e.g. Muhammad Ali" autocomplete="off">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="cnic">CNIC / Roll No</label>
        <input type="text" id="cnic" formControlName="cnic" placeholder="e.g. 42101-XXXXXXX-X" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="room">Assign Room</label>
        <input type="text" id="room" formControlName="roomAssigned" placeholder="e.g. Room 105" autocomplete="off">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" formControlName="phoneNumber" placeholder="e.g. +92 300 1234567" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="emergency">Emergency Contact</label>
        <input type="tel" id="emergency" formControlName="emergencyContact" placeholder="e.g. Parent/Guardian number" autocomplete="off">
      </div>
    </div>

    <button type="submit" class="btn-submit">
      {{ isEditMode ? 'Update Student Record' : 'Save Student Record' }}
    </button>
  </form>
</div>
